default_language_version:
  python: python3
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
      - id: debug-statements
      - id: check-docstring-first
  - repo: https://github.com/psf/black
    rev: 25.9.0
    hooks:
      - id: black
        language_version: python3
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        args: [--fix]
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.2
    hooks:
      - id: mypy
        args:
          - --ignore-missing-imports
        files: ^app/
        pass_filenames: true
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
      - id: bandit
        args:
          - -r
          - app/
          - -s
          - B101,B106,B108
        files: ^app/
        pass_filenames: false
        always_run: true
  - repo: local
    hooks:
      - id: check-file-naming
        name: Check file naming conventions
        entry: python ../scripts/shared/check_file_naming.py
        language: system
        types: [text]
        files: \.(md|sh)$
        pass_filenames: true
      - id: validate-enforcement-block
        name: Validate standards enforcement block
        entry: python ../scripts/shared/validate_enforcement_block.py
        language: system
        files: ^standards/
      - id: safety
        name: Check dependencies for known security vulnerabilities
        entry: safety check -r requirements.txt
        language: python
        types: [python]
        pass_filenames: false
        always_run: true
        additional_dependencies: [safety]
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: \.(json|yml|yaml)$
        exclude: ^(docs/_build/|node_modules/|\.git/|htmlcov/|docs/)
        language_version: system
